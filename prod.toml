max_steps = 10000000
seq_len = 32768
max_async_level = 1
output_dir = "/data/outputs/glm5-rlm"

[log]
level = "debug"

[wandb]
project = "RLM-GLM5"
name = "RLM-GLM5"

[model]
name = "zai-org/GLM-5"

[weight_broadcast]
type = "nccl"
port = 29502
timeout = 12000
use_vllm_format_transfer = true
quantize_fp8 = true

[deployment]
type = "multi_node"
num_train_nodes = 16
num_infer_nodes = 8
gpus_per_node = 8
num_infer_replicas = 3

[inference.deployment]
type = "disaggregated"
num_prefill_nodes = 2
num_prefill_replicas = 2
num_decode_nodes = 4

[slurm]
job_name = "RLM-GLM5"
partition = "cluster"

[ckpt]
interval = 20
keep_last = 5
resume_step = 140

[trainer]
dist_timeout_seconds = 7200

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
fused_lm_head_token_chunk_size = 2048
optim_cpu_offload = true
ep = 8

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.1


[orchestrator]
batch_size = 2048
rollouts_per_example = 16
oversampling_factor = 3
tasks_per_minute = 3072
max_off_policy_steps = 16
use_token_client = false

[orchestrator.sampling]
temperature = 1.0

[orchestrator.log]
vf_level = "debug"
env_worker_logs = true

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[[orchestrator.env]]
id = "deepdive-rlm"
name = "deepdive-rlm-bash"
args = { repl_language="bash", expose_message_history=true, root_max_completion_tokens=4096, sub_max_completion_tokens=10240, max_iterations = 20, code_execution_timeout = 600, open_max_workers = 512, cache_dir = "/data/outputs/rlm-prod/deepdive_cache", sandbox_labels = ["rlm-prod-cluster"], max_sub_llm_parallelism = 5, sub_prompt_verbosity = "light", root_prompt_verbosity = "light", cpu_cores = 2, memory_gb = 4, disk_size_gb = 4, timeout_minutes = 120, sandbox_client_max_workers = 512 }

[[orchestrator.env]]
id = "oolong-rlm"
name = "oolong-rlm-bash"
args = { repl_language="bash", expose_message_history=true, root_max_completion_tokens=4096, sub_max_completion_tokens=10240, subset="real", split="validation", max_iterations = 20, code_execution_timeout = 600, sandbox_labels = ["rlm-prod-cluster"], max_sub_llm_parallelism = 5, sub_prompt_verbosity = "light", root_prompt_verbosity = "light", cpu_cores = 2, memory_gb = 4, disk_size_gb = 4, timeout_minutes = 60, sandbox_client_max_workers = 512 }

