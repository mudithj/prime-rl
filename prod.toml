[orchestrator.buffer]
env_ratios = [
    0.2,  # deepdive (bash)
    0.2,  # oolong (bash)
    0.2,   # mini-swe (bash)
    0.1,  # deepdive (python)
    0.1,  # oolong (python)
    0.2   # mini-swe (python)
]
easy_threshold = 1.0
hard_threshold = 0.0

[inference]
enable_expert_parallel = true
# we need <0.85 bc glm5 layers are too large for 0.85
gpu_memory_utilization = 0.80
enable_eplb = false

[inference.model]
name = "zai-org/GLM-5-FP8"
max_model_len = 65536
tool_call_parser = "glm47"
