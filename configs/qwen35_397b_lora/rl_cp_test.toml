# Usage: uv run rl @ configs/qwen35_397b_lora/rl_cp_test.toml
#
# Qwen3.5-35B-A3B with CP=2 on 1 node for testing hybrid CP.
# Same hybrid DeltaNet + standard attention architecture as 397B, just smaller.

output_dir = "outputs/qwen35-35b-cp-test"
clean_output_dir = true
max_steps = 5
seq_len = 4096
max_async_level = 1

[slurm]
job_name = "qwen35-cp-test"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 0

[model]
name = "Qwen/Qwen3.5-35B-A3B"

[trainer]
dist_timeout_seconds = 600

[trainer.data.fake]
batch_size = 8

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
cp = 2
fused_lm_head_token_chunk_size = "disabled"

[trainer.model.ac]
freq = 1

[trainer.model.debug]
random_init = true

[trainer.optim]
lr = 1e-5

[orchestrator]
batch_size = 8
