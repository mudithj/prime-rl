# Usage: uv run rl @ configs/qwen35_397b_lora/rl.toml
#
# Qwen3.5-397B-A17B LoRA RL on 4 trainer nodes with fake data (no inference).
# 397B total params, 17B active (512 experts, 11 active per token).

output_dir = "/data/outputs/qwen35-397b-lora-rl"
clean_output_dir = true
max_steps = 10
seq_len = 65536
max_async_level = 5

[slurm]
job_name = "qwen35-397b-lora"

[deployment]
type = "multi_node"
num_train_nodes = 4
num_infer_nodes = 0

[model]
name = "Qwen/Qwen3.5-397B-A17B"

[trainer]
dist_timeout_seconds = 21600
max_concurrent_runs = 4
max_async_level = 5

[log]
level = "debug"

[trainer.metrics_server]
port = 9000

[trainer.data.fake]
batch_size = 8 

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
ep = 8
cp = 4
fused_lm_head_token_chunk_size = 1024

[trainer.model.ac]
freq = 1

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.model.lora]
rank = 16

[trainer.optim]
lr = 1e-4

[orchestrator]
batch_size = 8
